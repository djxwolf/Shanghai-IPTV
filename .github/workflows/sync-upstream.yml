name: Sync Upstream

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/ihipop/Shanghai-IPTV
          git fetch upstream master
          git merge upstream/master --no-edit

      - name: Generate shanghai-iptv.m3u8
        run: |
          sed -E 's|rtp://([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+):([0-9]+).*|http://192.168.20.1:4022/udp/\1:\2|' tel_mu.m3u8 > shanghai-iptv.m3u8

      - name: Commit and push
        run: |
          git add shanghai-iptv.m3u8
          git diff --cached --quiet || git commit -m "Auto-generate shanghai-iptv.m3u8 with udpxy"
          git push origin master
